name: ForceACL CI (MacKernelSDK Native)

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT
  SDKROOT: ${{ github.workspace }}/MacKernelSDK
  MACOSX_DEPLOYMENT_TARGET: 10.15
  ARCHS: arm64 x86_64

jobs:
  build:
    name: Build Kext (MacKernelSDK Only)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      # 💣 FORÇA USO DO MACKERNELSDK COMO BASE REAL
      - name: Setup Kernel SDK Environment
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          export KERNEL_SRC=$PWD/MacKernelSDK
          export CC=clang
          export CXX=clang++

          echo "USING MacKernelSDK ONLY"
          echo "SDKROOT=$SDKROOT"

      # ❌ NÃO usar ocbuild (ele conflita com kernel SDK)
      # ❌ NÃO usar xcrun SDK

      - name: Lilu Bootstrap
        run: |
          curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh | bash

      # 💣 BUILD DEBUG
      - name: Build Debug (Kernel SDK)
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean

          make BUILD_TYPE=debug ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -I$SDKROOT -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 💣 BUILD RELEASE
      - name: Build Release (Kernel SDK)
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean

          make BUILD_TYPE=release ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -I$SDKROOT -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 📦 ARTIFACTS
      - name: Package
        run: |
          mkdir -p artifacts

          if [ -d "build/Debug/ForceACL.kext" ]; then
            cp -R build/Debug/ForceACL.kext artifacts/
          fi

          if [ -d "build/Release/ForceACL.kext" ]; then
            cp -R build/Release/ForceACL.kext artifacts/
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ForceACL-Kext
          path: artifacts


  analyze:
    name: Analyze (Kernel SDK)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: Kernel Analyze
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean
          make ANALYZE=1 SDKROOT=$SDKROOT || true
