name: ForceACL CI (Stable Acidanthera Style)

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT
  MACOSX_DEPLOYMENT_TARGET: 10.15
  ARCHS: arm64 x86_64

jobs:
  build:
    name: Build Kext (Universal)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      # 🔥 FIX: usa SDK real do Xcode (NÃO MacKernelSDK como SDKROOT)
      - name: Setup Toolchain
        run: |
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          export KERNEL_INC=$PWD/MacKernelSDK

          echo "SDKROOT=$SDKROOT"
          echo "Kernel headers=$KERNEL_INC"

      # ❌ REMOVIDO ocbuild (ele quebra mais do que ajuda)
      # - name: CI Bootstrap (REMOVED)

      - name: Lilu Bootstrap
        run: |
          curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh | bash

      # 💣 BUILD DEBUG
      - name: Build Debug (Universal)
        run: |
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          make clean

          make BUILD_TYPE=debug ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -I$PWD/MacKernelSDK -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 💣 BUILD RELEASE
      - name: Build Release (Universal)
        run: |
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          make clean

          make BUILD_TYPE=release ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -I$PWD/MacKernelSDK -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 📦 ARTIFACTS
      - name: Package Kext
        run: |
          mkdir -p artifacts

          if [ -d "build/Debug/ForceACL.kext" ]; then
            cp -R build/Debug/ForceACL.kext artifacts/ForceACL-Debug.kext
            (cd artifacts && zip -r ForceACL-Debug.zip ForceACL-Debug.kext)
          fi

          if [ -d "build/Release/ForceACL.kext" ]; then
            cp -R build/Release/ForceACL.kext artifacts/ForceACL.kext
            (cd artifacts && zip -r ForceACL-Release.zip ForceACL.kext)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForceACL-Kext
          path: artifacts

      - name: Release upload
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/*.zip
          file_glob: true


  analyze:
    name: Static Analysis
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: Clang Analyze
        run: |
          export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
          make clean
          make ANALYZE=1 SDKROOT=$SDKROOT || true
