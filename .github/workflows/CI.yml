name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT
  SDKROOT: ${{ github.workspace }}/MacKernelSDK
  MACOSX_DEPLOYMENT_TARGET: 10.15

jobs:
  build:
    name: Build
    runs-on: macos-latest
    env:
      JOB_TYPE: BUILD

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: Force correct SDK usage
        run: |
          echo "SDKROOT=$SDKROOT"
          echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"

      - name: CI Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

      - name: Lilu Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh) && eval "$src" || exit 1

      - name: Build Debug
        run: |
          make clean
          make BUILD_TYPE=debug SDKROOT=$SDKROOT
          ls -la build/Debug/ForceACL.kext/Contents/MacOS/ || echo "Debug build failed"

      - name: Build Release
        run: |
          make clean
          make BUILD_TYPE=release SDKROOT=$SDKROOT
          ls -la build/Release/ForceACL.kext/Contents/MacOS/ || echo "Release build failed"

      - name: Build x86_64
        run: |
          make clean
          make ARCHS=x86_64 SDKROOT=$SDKROOT
          ls -la build/Release/ForceACL.kext/Contents/MacOS/ || echo "x86_64 build failed"

      - name: Create Artifacts
        run: |
          mkdir -p build/artifacts

          if [ -d "build/Debug/ForceACL.kext" ]; then
            cp -R build/Debug/ForceACL.kext build/artifacts/ForceACL-debug.kext
            cd build/artifacts
            zip -r ForceACL-debug.zip ForceACL-debug.kext
            cd ../..
          fi

          if [ -d "build/Release/ForceACL.kext" ]; then
            cp -R build/Release/ForceACL.kext build/artifacts/ForceACL.kext
            cd build/artifacts
            zip -r ForceACL-release.zip ForceACL.kext
            cd ../..
          fi

          echo "Artifacts:"
          ls -la build/artifacts || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForceACL-Kext
          path: build/artifacts

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/artifacts/*.zip
          tag: ${{ github.ref }}
          file_glob: true


  analyze-clang:
    name: Analyze Clang
    runs-on: macos-latest
    env:
      JOB_TYPE: ANALYZE
      SDKROOT: ${{ github.workspace }}/MacKernelSDK
      MACOSX_DEPLOYMENT_TARGET: 10.15

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: CI Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

      - name: Lilu Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh) && eval "$src" || exit 1

      - name: Analyze Debug
        run: |
          xcodebuild clean build \
            -scheme ForceACL \
            -configuration Debug \
            SDKROOT=$SDKROOT \
            CLANG_ANALYZER_OUTPUT=plist-html \
            CLANG_ANALYZER_OUTPUT_DIR="$(pwd)/clang-analyze" \
            || true

      - name: Analyze Release
        run: |
          xcodebuild clean build \
            -scheme ForceACL \
            -configuration Release \
            SDKROOT=$SDKROOT \
            CLANG_ANALYZER_OUTPUT=plist-html \
            CLANG_ANALYZER_OUTPUT_DIR="$(pwd)/clang-analyze" \
            || true


  analyze-coverity:
    name: Analyze Coverity
    runs-on: macos-latest
    env:
      JOB_TYPE: COVERITY
    if: false

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: CI Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1

      - name: Lilu Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh) && eval "$src" || exit 1

      - name: Coverity placeholder
        run: |
          echo "Coverity disabled - needs token"
