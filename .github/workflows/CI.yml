name: ForceACL CI (Acidanthera Level)

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT
  SDKROOT: ${{ github.workspace }}/MacKernelSDK
  MACOSX_DEPLOYMENT_TARGET: 10.15
  ARCHS: arm64 x86_64

jobs:
  build:
    name: Build Kext (Universal)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout Lilu
        uses: actions/checkout@v4
        with:
          repository: acidanthera/Lilu
          path: Lilu

      - name: Checkout MacKernelSDK
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: Force toolchain sanity
        run: |
          echo "SDKROOT=$SDKROOT"
          xcrun --show-sdk-path
          clang++ -v || true

      # 🔥 CRÍTICO: impede SDK do sistema de vazar
      - name: Override Apple SDK leak protection
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          export CC=clang
          export CXX=clang++
          export CFLAGS="-isysroot $SDKROOT"
          export LDFLAGS="-isysroot $SDKROOT"
          echo "Locked SDKROOT=$SDKROOT"

      - name: CI Bootstrap (ocbuild)
        run: |
          curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh | bash

      - name: Lilu Bootstrap
        run: |
          curl -Lfs https://raw.githubusercontent.com/acidanthera/Lilu/master/Lilu/Scripts/bootstrap.sh | bash

      # 💣 BUILD DEBUG
      - name: Build Debug (Universal)
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean
          make BUILD_TYPE=debug ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 💣 BUILD RELEASE
      - name: Build Release (Universal)
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean
          make BUILD_TYPE=release ARCHS="$ARCHS" \
            SDKROOT=$SDKROOT \
            OTHER_CFLAGS="-isysroot $SDKROOT -mkernel -nostdlib -fno-builtin" \
            OTHER_LDFLAGS="-isysroot $SDKROOT -mkernel -nostdlib"

      # 📦 ARTIFACTS
      - name: Package Kext
        run: |
          mkdir -p artifacts

          if [ -d "build/Debug/ForceACL.kext" ]; then
            cp -R build/Debug/ForceACL.kext artifacts/ForceACL-Debug.kext
            (cd artifacts && zip -r ForceACL-Debug.zip ForceACL-Debug.kext)
          fi

          if [ -d "build/Release/ForceACL.kext" ]; then
            cp -R build/Release/ForceACL.kext artifacts/ForceACL.kext
            (cd artifacts && zip -r ForceACL-Release.zip ForceACL.kext)
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ForceACL-Kext
          path: artifacts

      - name: Release upload
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/*.zip
          file_glob: true


  analyze:
    name: Static Analysis
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout deps
        uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK

      - name: Run clang static analysis
        run: |
          export SDKROOT=$PWD/MacKernelSDK
          make clean
          make ANALYZE=1 SDKROOT=$SDKROOT || true
